<script>
const $ = (id)=>document.getElementById(id);

// Logout แข็งแรง
function logout(){
  const overlay = document.createElement('div');
  overlay.className='loading-overlay';
  overlay.innerHTML = `<div class="text-center">
      <div class="spinner mx-auto mb-3"></div>
      <div class="fw-bold">กำลังออกจากระบบ...</div>
    </div>`;
  document.body.appendChild(overlay);

  try { localStorage.removeItem('userInfo'); } catch(e){}

  const target = '<?= getURL() ?>?page=logout';
  try { window.top.location.assign(target); } catch(e){}
  try { window.location.href = target; } catch(e){}
  setTimeout(()=>{ try { window.location.replace(target); } catch(e){} }, 150);
}

// ---------- การเลือกการ์ดเมนู ----------
function updateMenuCardSelection(){
  document.querySelectorAll('.menu-card').forEach(card=>{
    const r = card.querySelector('input[name="menu"]');
    card.classList.toggle('selected', r && r.checked);
  });
}
function wireCardClick(){
  document.querySelectorAll('.menu-card').forEach(card=>{
    card.addEventListener('click', (ev)=>{
      const tag = (ev.target.tagName||'').toLowerCase();
      if (['input','label','textarea','select'].includes(tag)) return;
      const radio = card.querySelector('input[name="menu"]');
      if (radio){
        radio.checked = true;
        radio.dispatchEvent(new Event('change', {bubbles:true}));
      }
    });
  });
}

// เปิด/ปิดช่อง custom ตามการติ๊ก radio + อัปเดตกรอบเลือก
(function setupCustomToggle(){
  const radios = document.querySelectorAll('input[name="menu"]');
  const custom = $('customName');
  radios.forEach(r=>{
    r.addEventListener('change', ()=>{
      if (r.value==='custom' && r.checked){
        custom.disabled=false;
        custom.focus();
      } else {
        custom.disabled=true;
        custom.value='';
      }
      updateMenuCardSelection();
    });
  });
  wireCardClick();
  updateMenuCardSelection();
})();

function validHN(hn){ return /^07-\d{2}-\d{6}$/.test(hn); }
function validDOB(dob){ return /^(0[1-9]|[12][0-9]|3[01])\/(0[1-9]|1[0-2])\/\d{4}$/.test(dob); }

function getPickedMenu(){
  const m = document.querySelector('input[name="menu"]:checked');
  return m ? m.value : null;
}
function clearForm(){
  ['hn','fullname','dob','allergy','comorb','note'].forEach(id => $(id).value = '');
  const checked = document.querySelector('input[name="menu"]:checked');
  if (checked) checked.checked = false;
  $('customName').value=''; $('customName').disabled=true;
  updateMenuCardSelection();
}

// โหลดรายชื่อแผนก + prefill user
async function populateDepartmentsAndPrefill(){
  let optionsHTML = '';
  try {
    optionsHTML = await new Promise((resolve, reject)=>{
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .getDepartmentHTML();
    });
  } catch (err) {
    console.error(err);
    Swal.fire({
      icon:'error',
      title:'โหลดรายชื่อแผนกไม่สำเร็จ',
      text:'สามารถกรอกข้อมูลอื่นได้ แต่โปรดเลือกแผนกด้วยตนเอง'
    });
  }

  $('department').innerHTML = optionsHTML || '<option value="">-- เลือกแผนก --</option>';

  const raw = localStorage.getItem('userInfo');
  if (raw){
    try{
      const user = JSON.parse(raw);
      if (user && user.department){
        const sel = $('department');
        const idx = Array.from(sel.options).findIndex(o => o.text === user.department);
        if (idx >= 0) sel.selectedIndex = idx;
      }
      $('requester').value = user.name || '';
      $('userDisplay').textContent = 'สวัสดี, ' + (user.name || '');
    }catch(e){}
  }
}

document.addEventListener('DOMContentLoaded', ()=>{
  requestAnimationFrame(async ()=>{
    const raw = localStorage.getItem('userInfo');
    if (!raw) return window.location.replace('<?= getURL() ?>?page=login');
    await populateDepartmentsAndPrefill();
  });
}, {passive:true});

// Submit form
document.getElementById('orderForm').addEventListener('submit', (e)=>{
  e.preventDefault();

  const menu = getPickedMenu();
  const customName = $('customName').value.trim();

  if (!validHN($('hn').value)) {
    return Swal.fire({
      icon:'warning',
      title:'รูปแบบ HN ไม่ถูกต้อง',
      text:'ตัวอย่าง 07-12-345678'
    });
  }
  if (!validDOB($('dob').value)) {
    return Swal.fire({
      icon:'warning',
      title:'วันเกิดไม่ถูกต้อง',
      text:'ใช้รูปแบบ dd/mm/yyyy (ปี ค.ศ.)'
    });
  }
  if (!menu) {
    return Swal.fire({
      icon:'warning',
      title:'กรุณาเลือกเมนู',
      text:'ต้องเลือกเมนูอย่างน้อย 1 รายการ'
    });
  }
  if (menu==='custom' && !customName) {
    return Swal.fire({
      icon:'warning',
      title:'กรุณากรอกชื่อเมนู (Custom)'
    });
  }

  const data = {
    hn:         $('hn').value.trim(),
    fullname:   $('fullname').value.trim(),
    dob:        $('dob').value.trim(),
    allergy:    $('allergy').value.trim(),
    comorb:     $('comorb').value.trim(),
    requester:  $('requester').value.trim(),
    department: $('department').value,
    menu,
    customName,
    note:       $('note').value.trim()
  };

  const btn = document.querySelector('button[type=submit]');
  const t0 = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';

  google.script.run
    .withSuccessHandler(rs=>{
      btn.disabled = false;
      btn.textContent = t0;

      if (rs && rs.success){
        Swal.fire({
          icon:'success',
          title: rs.message || 'บันทึกแล้ว',
          timer:1000,
          showConfirmButton:false
        }).then(()=> clearForm());
      }else{
        Swal.fire({
          icon:'error',
          title:'ผิดพลาด',
          text:(rs && rs.message) || 'โปรดลองใหม่'
        });
      }
    })
    .withFailureHandler(err=>{
      btn.disabled = false;
      btn.textContent = t0;
      Swal.fire({
        icon:'error',
        title:'ผิดพลาด',
        text:'ไม่สามารถบันทึกข้อมูลได้: ' + String(err)
      });
    })
    .saveData(data);
});
</script>
</template>

<script>
var t = 10, el = document.getElementById('countdown');
var timer = setInterval(function(){
  t--; el.textContent = t;
  if (t<=0){ clearInterval(timer); goToLogin(); }
}, 1000);
function goToLogin(){ window.location.href = '<?= getURL() ?>?page=login'; }
window.addEventListener('popstate', function(){ goToLogin(); });
history.pushState(null, null, window.location.href);
</script>

/**
 * afterDone: 
 *   - res.ok=true → แก้ไขแถวใน DataTables เฉพาะที่เปลี่ยน (เร็วขึ้น)
 *   - ถ้าแก้ไม่ได้ → fallback ไป reload ทั้งตาราง
 */
function afterDone(res, localId){
  Swal.close();

  if (res && res.ok){
    Swal.fire({
      icon: res.warn?'warning':'success',
      title: res.warn?'อัปเดตสำเร็จ (มีคำเตือน)':'อัปเดตเรียบร้อย',
      text: res.warn||'',
      timer: res.warn?1600:900,
      showConfirmButton: !res.warn
    });

    try{
      const table = $('#datatable').DataTable();
      const id = (res.id != null) ? Number(res.id) : Number(localId);

      let found = false;
      table.rows().every(function(){
        const d = this.data();
        if (Number(d[1]) === id){
          found = true;
          const newStatus = res.status || d[2];
          d[2] = newStatus;           // สถานะ
          d[0] = actionCell(newStatus); // Action cell ใหม่ตามสถานะ

          // อัปเดตเวลา/Staff ตาม step
          if (res.step === 0 && res.time){
            d[19] = res.time;              // เวลารับ Order
            if (res.staff) d[20] = res.staff;
          }else if (res.step === 1 && res.time){
            d[21] = res.time;              // เวลาเตรียม
            if (res.staff) d[22] = res.staff;
          }else if (res.step === 2 && res.time){
            d[23] = res.time;              // เวลารับ Order ของ Dept
            if (res.staff) d[24] = res.staff;
          }

          this.data(d).invalidate();
        }
      });

      if (found){
        table.draw(false);  // redraw หน้าเดิม (ไม่กระโดดหน้า)
      }else{
        // ถ้าไม่เจอ ID (เช่น filter อยู่) → reload ทั้งตาราง
        google.script.run.withSuccessHandler(renderTable).getAllow();
      }

    }catch(e){
      // fallback: มี error ในการอัปเดตแถว → โหลดใหม่ทั้งชุด
      google.script.run.withSuccessHandler(renderTable).getAllow();
    }

    // refresh ตัวเลข pending (เบาๆ)
    refreshPendingIndicator();

  }else{
    Swal.fire({
      icon:'warning',
      title:'ไม่สามารถอัปเดตได้',
      text:(res && res.error)||''
    });
    google.script.run.withSuccessHandler(renderTable).getAllow();
  }
}

  <script>
  (function(){
    const elIndicator=document.getElementById('pendingIndicator');
    const elPendingNum=document.getElementById('pendingCount');
    const elSoundSel=document.getElementById('soundSelect');
    const elVol=document.getElementById('volumeSlider');
    const elEnabled=document.getElementById('soundEnabled');
    const elToggleBtn=document.getElementById('toggleSoundPanel');
    const elPanel=document.getElementById('soundControl');
    const elPanelBody=document.getElementById('soundPanelContent');
    const audioEl=document.getElementById('alarmAudio');

    // restore settings
    elSoundSel.value=localStorage.getItem('alertSound')||elSoundSel.value;
    elVol.value=localStorage.getItem('alertVol')||elVol.value;
    document.getElementById('volumeValue').textContent=elVol.value;
    elEnabled.checked=(localStorage.getItem('alertEnabled')!=='0');

    let AC=null, masterGain=null;
    function ensureAC(){
      if (!AC){
        AC=new (window.AudioContext||window.webkitAudioContext)();
        masterGain=AC.createGain();
        masterGain.gain.value=Number(elVol.value)/100;
        masterGain.connect(AC.destination);
      }
    }
    function tone(freq,dur,type='sine',start=0,peak=1.0){
      const osc=AC.createOscillator(), g=AC.createGain();
      osc.type=type; osc.frequency.value=freq; osc.connect(g); g.connect(masterGain);
      const t0=AC.currentTime+start; 
      g.gain.setValueAtTime(0.0001,t0);
      g.gain.linearRampToValueAtTime(peak,t0+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
      osc.start(t0); 
      osc.stop(t0+dur);
    }
    function playBuiltInPattern(name){
      ensureAC(); 
      if (AC.state==='suspended') AC.resume();
      switch(name){
        case 'bell':
          tone(587,0.50,'triangle',0,0.85);
          tone(880,0.30,'triangle',0.18,0.7);
          break;
        case 'chime':
          tone(880,0.30,'sine',0,0.9);
          tone(660,0.25,'sine',0.28,0.8);
          break;
        case 'alert':
          for(let i=0;i<4;i++) tone(i%2?1200:900,0.12,'square',i*0.16,0.9);
          break;
        case 'ding':
          tone(1568,0.18,'sine',0,0.95);
          break;
        default:
          tone(1000,0.12,'square',0,0.8);
          tone(1200,0.10,'square',0.16,0.8);
      }
    }

    // โหลด URL ไฟล์เสียง (ถ้ามี)
    let alarmMp3Url='';
    if (google && google.script && google.script.run){
      google.script.run.withSuccessHandler(function(url){
        alarmMp3Url=url||'';
        if (elSoundSel.value==='notification' && alarmMp3Url){ audioEl.src=alarmMp3Url; }
      }).getAlarmMp3Url();
    }

    // เตรียม audio pipeline (ต้องมี user interaction ครั้งแรก)
    function armAudioPipeline(){
      if (elSoundSel.value==='notification' && alarmMp3Url){ audioEl.src=alarmMp3Url; }
      audioEl.volume=Number(elVol.value)/100; 
      audioEl.muted=true;
      audioEl.play().then(()=>{
        audioEl.pause(); 
        audioEl.currentTime=0; 
        audioEl.muted=false;
      }).catch(()=>{});
      if (typeof Notification!=='undefined' && Notification.permission==='default'){
        Notification.requestPermission();
      }
    }
    window.addEventListener('click', function onFirst(){
      armAudioPipeline();
      window.removeEventListener('click', onFirst);
    }, {once:true});

    // control panel events
    elSoundSel.addEventListener('change', ()=>{
      localStorage.setItem('alertSound', elSoundSel.value);
      if (elSoundSel.value==='notification' && alarmMp3Url){ audioEl.src=alarmMp3Url; }
    });
    elVol.addEventListener('input', ()=>{
      localStorage.setItem('alertVol', elVol.value);
      document.getElementById('volumeValue').textContent=elVol.value;
      if (masterGain) masterGain.gain.value=Number(elVol.value)/100;
      audioEl.volume=Number(elVol.value)/100;
    });
    elEnabled.addEventListener('change', ()=>{
      localStorage.setItem('alertEnabled', elEnabled.checked?'1':'0');
    });
    elToggleBtn.addEventListener('click', ()=>{
      const collapsed=elPanel.classList.toggle('collapsed');
      elPanelBody.style.display=collapsed?'none':'';
      elToggleBtn.textContent=collapsed?'+':'−';
    });

    function showIndicator(count){
      elPendingNum.textContent=count;
      if (count>0) elIndicator.classList.remove('d-none');
      else elIndicator.classList.add('d-none');
    }
    function notifyOS(count){
      if (typeof Notification==='undefined') return;
      if (Notification.permission!=='granted') return;
      new Notification('🍽️ มีออเดอร์ใหม่',{
        body:`รอรับออเดอร์ ${count} รายการ`,
        requireInteraction:true
      });
    }
    async function playOnce(){
      if (!elEnabled.checked) return false;
      const sel=elSoundSel.value;
      if (sel==='notification' && alarmMp3Url){
        try{
          if (audioEl.src!==alarmMp3Url) audioEl.src=alarmMp3Url;
          audioEl.currentTime=0;
          await audioEl.play();
          setTimeout(()=>{try{audioEl.pause();}catch(e){}}, 2500);
          return true;
        }catch(e){
          playBuiltInPattern('notification');
          return false;
        }
      }
      playBuiltInPattern(sel);
      return true;
    }

    let lastPending=0;
    let alarmTimer=null;
    let lastVersion=0;

    function scheduleAlarm(){
      if (alarmTimer) clearInterval(alarmTimer);
      if (lastPending<=0) return;
      // เตือนซ้ำทุก 15 วินาที ถ้ายังมี Pending ค้าง
      alarmTimer=setInterval(()=>{
        playOnce().then(ok=>{
          if (!ok && document.hidden) notifyOS(lastPending);
        });
      },15000);
    }

    // คำนวณ Pending จากข้อมูลจริง
    function fetchPendingOnce(){
      const handle=(rows)=>{
        const pending=(rows||[]).filter(r=>{
          const st=String(r[1]||'');
          return !st ||
            (!st.includes('Food House รับ Order') &&
             !st.includes('Food House เตรียมอาหารเสร็จแล้ว') &&
             !st.includes('หน่วยงานรับอาหารแล้ว'));
        }).length;
        window.dispatchEvent(new CustomEvent('pending-changed',{detail:{count:pending}}));
      };
      google.script.run
        .withSuccessHandler(handle)
        .withFailureHandler(function(){
          google.script.run.withSuccessHandler(handle).getAllow();
        })
        .getAllowLive();
    }

    // เมื่อ Pending เปลี่ยน
    window.addEventListener('pending-changed',(ev)=>{
      const newCount = Number((ev.detail&&ev.detail.count)||0);
      const prev = lastPending;
      lastPending = newCount;

      showIndicator(lastPending);

      // 🔔 เล่นเสียง "เฉพาะตอน Pending เพิ่มขึ้น" = มี Order ใหม่
      if (newCount > prev){
        playOnce().then(ok=>{
          if (!ok && document.hidden) notifyOS(lastPending);
        });
      }

      scheduleAlarm();
    });

    // === WATCH VERSION: ใช้ version cell เพื่อลดการ refresh ถี่ๆ ===
    function startVersionWatch(){
      google.script.run
        .withSuccessHandler(function(v){
          lastVersion = Number(v) || 0;
          checkVersionLoop();
        })
        .withFailureHandler(function(){
          lastVersion = 0;
          checkVersionLoop();
        })
        .getCurrentVersion();
    }
    function checkVersionLoop(){
      google.script.run
        .withSuccessHandler(function(v){
          v = Number(v) || 0;
          if (v !== lastVersion){
            lastVersion = v;
            // มีการเปลี่ยนแปลงข้อมูล: reload pending + ตาราง Approved
            fetchPendingOnce();
            if (window.renderTable){
              google.script.run.withSuccessHandler(window.renderTable).getAllow();
            }
          }
          // เรียกเบาๆ แค่ getCurrentVersion ทุก 4 วิ
          setTimeout(checkVersionLoop, 4000);
        })
        .withFailureHandler(function(){
          setTimeout(checkVersionLoop, 8000);
        })
        .getCurrentVersion();
    }

    // initial
    fetchPendingOnce();
    startVersionWatch();
  })();
  </script>
</template>
